<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Playtest Tracker</title>
<style>
  :root{
    --bg:#0a0d12; --panel:#12161d; --panel2:#171c24; --line:rgba(255,255,255,0.08);
    --text:#e8dcc0; --muted:#8a94a6; --accent:#7ce8a8; --gold:#e8c76a;
    --fail:#e86a6a; --blocked:#c8a8e8; --untested:#3a3f48;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:Georgia,'Times New Roman',serif;
    height:100vh;overflow:hidden}
  button, select, input, textarea{font-family:inherit;color:var(--text);background:var(--panel2);
    border:1px solid var(--line);border-radius:6px;padding:6px 10px}
  button{cursor:pointer}
  button:hover{border-color:var(--accent)}
  h1,h2,h3{margin:0 0 8px;font-weight:bold}
  #app{display:grid;grid-template-columns:260px 1fr;grid-template-rows:auto 1fr;height:100vh}
  #topbar{grid-column:1/3;display:flex;align-items:center;gap:10px;padding:10px 16px;
    background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
  #topbar h1{font-size:18px;color:var(--accent);margin:0 16px 0 0}
  #sidebar{background:var(--panel);border-right:1px solid var(--line);overflow-y:auto;padding:12px}
  #main{overflow-y:auto;padding:20px 28px}
  .runItem{padding:8px 10px;border-radius:6px;margin-bottom:6px;cursor:pointer;border:1px solid transparent;
    font-size:13px}
  .runItem:hover{border-color:var(--line)}
  .runItem.active{background:var(--panel2);border-color:var(--accent)}
  .runItem .meta{color:var(--muted);font-size:11px}
  .passGroup{margin-bottom:22px}
  .passTitle{font-size:15px;color:var(--gold);border-bottom:1px solid var(--line);padding-bottom:4px;
    margin-bottom:10px}
  .item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
  .item .txt{flex:1;padding-top:6px}
  .statusBtn{width:96px;text-align:center;font-size:12px;font-weight:bold;flex-shrink:0}
  .statusBtn.untested{background:var(--panel2);color:var(--muted)}
  .statusBtn.pass{background:rgba(124,232,168,0.18);color:var(--accent);border-color:var(--accent)}
  .statusBtn.fail{background:rgba(232,106,106,0.18);color:var(--fail);border-color:var(--fail)}
  .statusBtn.blocked{background:rgba(200,168,232,0.18);color:var(--blocked);border-color:var(--blocked)}
  .note{width:100%;min-height:32px;font-size:12px;margin-top:4px;resize:vertical}
  .itemCol{flex:1}
  .rmBtn{color:var(--fail);border-color:transparent;background:none;font-size:12px}
  .bugCard{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:12px;margin-bottom:10px}
  .bugCard .sev{font-size:11px;font-weight:bold;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:6px}
  .sev-Blocker{background:rgba(232,106,106,0.3);color:var(--fail)}
  .sev-Critical{background:rgba(232,150,106,0.3);color:#e8a06a}
  .sev-Major{background:rgba(232,199,106,0.25);color:var(--gold)}
  .sev-Minor{background:rgba(140,148,166,0.25);color:var(--muted)}
  .sev-Cosmetic{background:rgba(140,148,166,0.12);color:var(--muted)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .field{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
  .field label{font-size:11px;color:var(--muted)}
  .tabs{display:flex;gap:6px;margin-bottom:16px}
  .tabs button{opacity:0.55}
  .tabs button.active{opacity:1;border-color:var(--accent);color:var(--accent)}
  .addRow{display:flex;gap:8px;margin-top:8px}
  .addRow input{flex:1}
  .summary{display:flex;gap:14px;font-size:13px;color:var(--muted);margin-bottom:16px}
  .summary b{color:var(--text)}
  textarea{width:100%}
  .hint{color:var(--muted);font-size:12px;margin-bottom:14px}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <h1>Playtest Tracker</h1>
    <select id="gameSel"></select>
    <button id="newGameBtn">+ new game</button>
    <button id="pullBtn" title="Re-fetch data/&lt;game&gt;.json from this repo — picks up anything Claude committed in a chat">⭯ Pull latest</button>
    <span id="pullStatus" class="hint" style="margin:0"></span>
    <span style="width:1px;height:20px;background:var(--line)"></span>
    <input id="buildInput" placeholder="build / task # (e.g. JF-#038)" style="width:220px">
    <button id="newRunBtn">Start New Run</button>
    <span style="flex:1"></span>
    <button id="exportBtn">Export JSON</button>
    <button id="exportMdBtn">Export run as Markdown</button>
    <label style="border:1px solid var(--line);border-radius:6px;padding:6px 10px;cursor:pointer">
      Import JSON <input id="importInput" type="file" accept="application/json" style="display:none">
    </label>
  </div>
  <div id="sidebar">
    <h3 style="color:var(--muted);font-size:12px;letter-spacing:1px">RUN HISTORY</h3>
    <div id="runList"></div>
  </div>
  <div id="main"></div>
</div>
<script>
'use strict';
const KEY = 'ptt_state_v1';

// Seeded from PLAYTEST_CHECKLIST.md — generic, game-agnostic; editable per game.
const DEFAULT_SUITE = [
  { pass: 'Pass 1 — Smoke test', items: [
    'Loads with no console errors',
    'Reaches gameplay in ≤1 input from load',
    'Core loop reachable and completes one full cycle',
    'Restart/retry works',
    'Audio plays, mute works',
    'No crash, no stuck states, no infinite loading',
  ]},
  { pass: 'Pass 2 — Cold / first-time-user test', items: [
    'Played with zero prior context / instructions',
    'No "wait, what do I do?" moments (or noted below if any)',
    'Every action attempted was handled gracefully',
    'Always clear: what to do now / what I just did / what’s next',
  ]},
  { pass: 'Pass 3 — Systematic feature pass', items: [
    'Every menu screen: every control does what its label says',
    'Every input method reaches every action (keyboard/touch/controller)',
    'Every currency/progression system: earn it, spend it, see it update',
    'Every save/load path: close and reopen, state survives correctly',
    'Edge states checked: 0 of something, max of something, first vs Nth time',
    'Checked at min and max supported resolution/aspect ratio',
  ]},
  { pass: 'Pass 4 — Balance / fun pass', items: [
    'Played 3–5 full sessions back to back',
    'No unfair difficulty spikes found (or noted below)',
    'No boring/repetitive stretch found (or noted below)',
    'Would play a 4th/5th run — yes/no + why (note below)',
    'Rated 1-5: fun / fair / clear / would-recommend (note below)',
  ]},
  { pass: 'Pass 5 — Platform compliance pass', items: [
    'Re-ran the platform’s own requirements checklist top to bottom',
    'Tested on actual target device classes, not just desktop',
    'Tested failure paths: adblock on, slow network, background tab, orientation change',
  ]},
  { pass: 'Pass 6 — Regression pass', items: [
    'Re-tested everything touching the same system as the latest fix',
    'Re-ran the smoke test (Pass 1) in full',
    'Re-tested every caller of any shared/adapter code that changed',
  ]},
];

function load(){
  try { const s = JSON.parse(localStorage.getItem(KEY)); if (s && s.games) return s; } catch(e){}
  return { games: {}, currentGame: null, currentRun: {} };
}
function save(){ localStorage.setItem(KEY, JSON.stringify(STATE)); }
let STATE = load();

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function ensureGame(name){
  if (!STATE.games[name]) STATE.games[name] = { suite: JSON.parse(JSON.stringify(DEFAULT_SUITE)), runs: [] };
}

// -------------------------------------------------------------- git sync ----
// One-way sync: a Claude chat session commits data/<game>.json directly to
// this (now public) repo when you give feedback in conversation; this app
// only ever READS that file (a static page can't safely hold a GitHub write
// token in public code, so it never pushes on its own). "Pull latest" and
// the auto-pull-on-load below are how the browser's local view catches up.
async function fetchGameFile(name){
  try {
    const res = await fetch('data/' + encodeURIComponent(name) + '.json', { cache: 'no-store' });
    if (!res.ok) return null;
    return await res.json();
  } catch(e){ return null; }
}
async function fetchIndex(){
  try {
    const res = await fetch('data/index.json', { cache: 'no-store' });
    if (!res.ok) return [];
    return await res.json();
  } catch(e){ return []; }
}
// merge-by-id so a pull never silently drops runs only present in one side
function mergeGame(local, incoming){
  if (!incoming) return local;
  if (!local) return incoming;
  const byId = new Map();
  [...incoming.runs, ...local.runs].forEach(r => byId.set(r.id, r));
  const runs = [...byId.values()].sort((a,b) => new Date(b.date) - new Date(a.date));
  return { suite: incoming.suite || local.suite, runs };
}
async function pullGame(name, silent){
  const status = document.getElementById('pullStatus');
  if (status) status.textContent = 'pulling...';
  const incoming = await fetchGameFile(name);
  if (incoming){
    STATE.games[name] = mergeGame(STATE.games[name], incoming);
    save();
    if (status) status.textContent = 'pulled ' + new Date().toLocaleTimeString();
  } else if (status) status.textContent = silent ? '' : 'no data/' + name + '.json yet';
  return incoming;
}
function newRun(gameName, build){
  const g = STATE.games[gameName];
  const run = { id: uid(), build: build || '(unspecified build)', date: new Date().toISOString(),
    results: {}, bugs: [], debrief: { q1:'', q2:'', q3:'', q4:'', q5:'' } };
  g.runs.unshift(run);
  return run;
}
function currentGame(){ return STATE.games[STATE.currentGame]; }
function currentRun(){
  const g = currentGame(); if (!g) return null;
  const rid = STATE.currentRun[STATE.currentGame];
  return g.runs.find(r => r.id === rid) || g.runs[0] || null;
}

// ---------------------------------------------------------------- render ----
let activeTab = 'checklist';

function itemId(passIdx, itemIdx){ return passIdx + ':' + itemIdx; }

function cycleStatus(s){
  return s === 'untested' ? 'pass' : s === 'pass' ? 'fail' : s === 'fail' ? 'blocked' : 'untested';
}

function renderGameSelect(){
  const sel = document.getElementById('gameSel');
  sel.innerHTML = '';
  Object.keys(STATE.games).forEach(name => {
    const o = document.createElement('option'); o.value = name; o.textContent = name;
    if (name === STATE.currentGame) o.selected = true;
    sel.appendChild(o);
  });
}

function renderRunList(){
  const list = document.getElementById('runList');
  list.innerHTML = '';
  const g = currentGame();
  if (!g || !g.runs.length){ list.innerHTML = '<div class="hint">No runs yet.</div>'; return; }
  const run = currentRun();
  g.runs.forEach(r => {
    const div = document.createElement('div');
    div.className = 'runItem' + (run && r.id === run.id ? ' active' : '');
    const counts = tallyResults(r);
    div.innerHTML = `<div>${r.build}</div><div class="meta">${new Date(r.date).toLocaleString()}</div>
      <div class="meta">✓${counts.pass} ✗${counts.fail} ⛔${counts.blocked} · ${r.bugs.length} bug${r.bugs.length===1?'':'s'}</div>`;
    div.onclick = () => { STATE.currentRun[STATE.currentGame] = r.id; save(); renderAll(); };
    list.appendChild(div);
  });
}

function tallyResults(run){
  let pass=0, fail=0, blocked=0, untested=0;
  const g = currentGame();
  g.suite.forEach((p, pi) => p.items.forEach((it, ii) => {
    const s = (run.results[itemId(pi,ii)] || {}).status || 'untested';
    if (s==='pass') pass++; else if (s==='fail') fail++; else if (s==='blocked') blocked++; else untested++;
  }));
  return { pass, fail, blocked, untested };
}

function renderMain(){
  const main = document.getElementById('main');
  const g = currentGame(); const run = currentRun();
  if (!g){ main.innerHTML = '<div class="hint">Create or select a game above to get started.</div>'; return; }
  if (!run){ main.innerHTML = '<div class="hint">No run yet for this game — click "Start New Run" above.</div>'; return; }

  const counts = tallyResults(run);
  let html = `<div class="summary">
    <div><b>${run.build}</b></div>
    <div>${new Date(run.date).toLocaleString()}</div>
    <div style="color:var(--accent)">✓ ${counts.pass} pass</div>
    <div style="color:var(--fail)">✗ ${counts.fail} fail</div>
    <div style="color:var(--blocked)">⛔ ${counts.blocked} blocked</div>
    <div>${counts.untested} untested</div>
  </div>
  <div class="tabs">
    <button data-tab="checklist" class="${activeTab==='checklist'?'active':''}">Checklist</button>
    <button data-tab="bugs" class="${activeTab==='bugs'?'active':''}">Bugs (${run.bugs.length})</button>
    <button data-tab="debrief" class="${activeTab==='debrief'?'active':''}">Debrief</button>
  </div>`;

  if (activeTab === 'checklist'){
    g.suite.forEach((p, pi) => {
      html += `<div class="passGroup"><div class="passTitle">${p.pass}</div>`;
      p.items.forEach((it, ii) => {
        const id = itemId(pi, ii);
        const r = run.results[id] || { status: 'untested', note: '' };
        html += `<div class="item">
          <button class="statusBtn ${r.status}" data-id="${id}">${r.status.toUpperCase()}</button>
          <div class="itemCol">
            <div class="txt">${it}</div>
            <textarea class="note" data-id="${id}" placeholder="notes...">${r.note || ''}</textarea>
          </div>
          <button class="rmBtn" data-pi="${pi}" data-ii="${ii}" title="remove item">✕</button>
        </div>`;
      });
      html += `<div class="addRow"><input placeholder="add a checklist item to this pass..." data-pi="${pi}" class="addItemInput">
        <button class="addItemBtn" data-pi="${pi}">add</button></div></div>`;
    });
  } else if (activeTab === 'bugs'){
    html += `<div class="bugCard" id="bugForm">
      <h3 style="margin-bottom:10px">Report a bug</h3>
      <div class="field"><label>Title</label><input id="bugTitle" placeholder="one line, specific"></div>
      <div class="grid2">
        <div class="field"><label>Severity</label>
          <select id="bugSev"><option>Blocker</option><option>Critical</option><option>Major</option>
            <option selected>Minor</option><option>Cosmetic</option></select></div>
        <div class="field"><label>Frequency</label>
          <select id="bugFreq"><option>always</option><option>sometimes</option><option>once</option></select></div>
      </div>
      <div class="field"><label>Repro steps</label><textarea id="bugRepro" placeholder="1. ... 2. ... 3. ..."></textarea></div>
      <div class="grid2">
        <div class="field"><label>Expected</label><textarea id="bugExpected"></textarea></div>
        <div class="field"><label>Actual</label><textarea id="bugActual"></textarea></div>
      </div>
      <button id="addBugBtn">Add bug</button>
    </div>`;
    run.bugs.forEach(b => {
      html += `<div class="bugCard">
        <span class="sev sev-${b.severity}">${b.severity}</span>
        <button class="rmBtn" data-bug="${b.id}" style="float:right">remove</button>
        <h3>${b.title}</h3>
        <div class="hint">Frequency: ${b.freq}</div>
        <div><b>Repro:</b><br>${(b.repro||'').replace(/\n/g,'<br>')}</div>
        <div style="margin-top:6px"><b>Expected:</b> ${b.expected||''}</div>
        <div><b>Actual:</b> ${b.actual||''}</div>
      </div>`;
    });
  } else if (activeTab === 'debrief'){
    const Q = [
      ['q1','What’s the one thing that would make me not recommend this to a friend?'],
      ['q2','What’s the first thing I’d fix if I could only fix one thing?'],
      ['q3','Did anything feel like it wasted my time?'],
      ['q4','What surprised me (good or bad)?'],
      ['q5','Am I more or less excited to play again than before this session?'],
    ];
    Q.forEach(([k, q]) => {
      html += `<div class="field"><label>${q}</label>
        <textarea data-debrief="${k}" rows="2">${run.debrief[k] || ''}</textarea></div>`;
    });
  }
  main.innerHTML = html;
  wireMainEvents();
}

function wireMainEvents(){
  const run = currentRun(); if (!run) return;
  document.querySelectorAll('.statusBtn').forEach(b => b.onclick = () => {
    const id = b.dataset.id;
    const r = run.results[id] || { status: 'untested', note: '' };
    r.status = cycleStatus(r.status);
    run.results[id] = r;
    save(); renderMain(); renderRunList();
  });
  document.querySelectorAll('.note').forEach(n => n.onchange = () => {
    const id = n.dataset.id;
    const r = run.results[id] || { status: 'untested', note: '' };
    r.note = n.value; run.results[id] = r; save();
  });
  document.querySelectorAll('.rmBtn[data-pi]').forEach(b => b.onclick = () => {
    const g = currentGame(); const pi = +b.dataset.pi, ii = +b.dataset.ii;
    g.suite[pi].items.splice(ii, 1); save(); renderMain();
  });
  document.querySelectorAll('.addItemBtn').forEach(b => b.onclick = () => {
    const pi = +b.dataset.pi;
    const input = document.querySelector(`.addItemInput[data-pi="${pi}"]`);
    if (!input.value.trim()) return;
    currentGame().suite[pi].items.push(input.value.trim());
    save(); renderMain();
  });
  const addBugBtn = document.getElementById('addBugBtn');
  if (addBugBtn) addBugBtn.onclick = () => {
    const title = document.getElementById('bugTitle').value.trim();
    if (!title) return;
    run.bugs.push({
      id: uid(), title,
      severity: document.getElementById('bugSev').value,
      freq: document.getElementById('bugFreq').value,
      repro: document.getElementById('bugRepro').value,
      expected: document.getElementById('bugExpected').value,
      actual: document.getElementById('bugActual').value,
    });
    save(); renderMain(); renderRunList();
  };
  document.querySelectorAll('.rmBtn[data-bug]').forEach(b => b.onclick = () => {
    run.bugs = run.bugs.filter(x => x.id !== b.dataset.bug); save(); renderMain(); renderRunList();
  });
  document.querySelectorAll('[data-debrief]').forEach(t => t.onchange = () => {
    run.debrief[t.dataset.debrief] = t.value; save();
  });
  document.querySelectorAll('.tabs button').forEach(b => b.onclick = () => {
    activeTab = b.dataset.tab; renderMain();
  });
}

function renderAll(){ renderGameSelect(); renderRunList(); renderMain(); }

// ------------------------------------------------------------------ setup --
document.getElementById('gameSel').onchange = e => {
  STATE.currentGame = e.target.value; save(); renderAll();
};
document.getElementById('newGameBtn').onclick = () => {
  const name = prompt('Game name (e.g. jade-fist):'); if (!name) return;
  ensureGame(name); STATE.currentGame = name; save(); renderAll();
};
document.getElementById('newRunBtn').onclick = () => {
  if (!STATE.currentGame){ alert('Create or select a game first.'); return; }
  const build = document.getElementById('buildInput').value.trim();
  const run = newRun(STATE.currentGame, build);
  STATE.currentRun[STATE.currentGame] = run.id;
  save(); renderAll();
};
document.getElementById('exportBtn').onclick = () => {
  const blob = new Blob([JSON.stringify(STATE, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'playtest-data-' + new Date().toISOString().slice(0,10) + '.json'; a.click();
};
document.getElementById('exportMdBtn').onclick = () => {
  const g = currentGame(); const run = currentRun();
  if (!g || !run){ alert('No run to export.'); return; }
  const counts = tallyResults(run);
  let md = `# Playtest — ${STATE.currentGame} — ${run.build}\n\n`;
  md += `Date: ${new Date(run.date).toLocaleString()}\n\n`;
  md += `**Summary**: ${counts.pass} pass / ${counts.fail} fail / ${counts.blocked} blocked / ${counts.untested} untested\n\n`;
  g.suite.forEach((p, pi) => {
    md += `## ${p.pass}\n`;
    p.items.forEach((it, ii) => {
      const r = run.results[itemId(pi,ii)] || { status: 'untested', note: '' };
      const mark = r.status === 'pass' ? '[x]' : r.status === 'fail' ? '[FAIL]' : r.status === 'blocked' ? '[BLOCKED]' : '[ ]';
      md += `- ${mark} ${it}${r.note ? '  — ' + r.note : ''}\n`;
    });
    md += '\n';
  });
  if (run.bugs.length){
    md += `## Bugs\n`;
    run.bugs.forEach(b => {
      md += `### ${b.title} (${b.severity})\n- Frequency: ${b.freq}\n- Repro: ${b.repro}\n- Expected: ${b.expected}\n- Actual: ${b.actual}\n\n`;
    });
  }
  md += `## Debrief\n`;
  const Q = [
    ['q1','What would make me not recommend this to a friend?'],
    ['q2','First thing I’d fix if I could only fix one?'],
    ['q3','Did anything waste my time?'],
    ['q4','What surprised me?'],
    ['q5','More or less excited to play again?'],
  ];
  Q.forEach(([k,q]) => { md += `- **${q}** ${run.debrief[k] || '(no answer)'}\n`; });
  const blob = new Blob([md], { type: 'text/markdown' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `playtest-${STATE.currentGame}-${run.build.replace(/[^a-z0-9-]/gi,'_')}.md`; a.click();
};
document.getElementById('importInput').onchange = e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const incoming = JSON.parse(reader.result);
      Object.keys(incoming.games || {}).forEach(name => {
        if (!STATE.games[name]) STATE.games[name] = incoming.games[name];
        else STATE.games[name].runs = [...incoming.games[name].runs, ...STATE.games[name].runs];
      });
      save(); renderAll();
      alert('Imported.');
    } catch(err){ alert('Could not read that file: ' + err.message); }
  };
  reader.readAsText(file);
};

document.getElementById('pullBtn').onclick = async () => {
  if (!STATE.currentGame){ alert('Create or select a game first.'); return; }
  await pullGame(STATE.currentGame, false);
  renderAll();
};

if (!STATE.currentGame || !STATE.games[STATE.currentGame]) {
  const names = Object.keys(STATE.games);
  if (names.length) STATE.currentGame = names[0];
}
renderAll();

// JF-style startup sync: pull the index of known games (so games Claude has
// already committed data for show up even on a browser that's never touched
// them), ensure a local shell for each, then silently pull the current one.
(async () => {
  const names = await fetchIndex();
  names.forEach(n => ensureGame(n));
  if (!STATE.currentGame && names.length) STATE.currentGame = names[0];
  if (STATE.currentGame){ await pullGame(STATE.currentGame, true); }
  save(); renderAll();
})();
</script>
</body>
</html>
